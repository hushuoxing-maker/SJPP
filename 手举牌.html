<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>卡通综艺手举牌生成器 - 古月AI智能体</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"Microsoft YaHei";
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a,#222);
  color:#fff;
  padding:40px;
}

/* 标题 */
.header{
  text-align:center;
  margin-bottom:40px;
}
.header h1{
  font-size:34px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  -webkit-background-clip:text;
  color:transparent;
}
.header p{
  color:#aaa;
  margin-top:10px;
}

/* 容器 */
.container{
  max-width:950px;
  margin:auto;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
}

/* 图框 */
.frame{
  border:2px dashed rgba(255,255,255,0.2);
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
}

/* 标签 */
.label{
  font-size:14px;
  color:#aaa;
  margin-bottom:5px;
}

/* 输入 */
input,select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* 按钮 */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff00ff,#00f5ff);
  cursor:pointer;
  font-size:16px;
}

/* 结果 */
.result{
  max-width:950px;
  margin:40px auto;
}

/* 卡片 */
.item{
  display:flex;
  justify-content:space-between;
  gap:15px;
  padding:16px;
  margin-bottom:12px;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(255,0,255,0.15),rgba(0,255,255,0.08));
  border:1px solid rgba(255,255,255,0.1);
}

.text{
  flex:1;
  font-size:14px;
  line-height:1.6;
}

/* 复制按钮 */
.copy{
  background:#ff00ff;
  border:none;
  padding:6px 12px;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

.copy.copied{
  background:#555;
}

/* 一键复制 */
.copyAll{
  text-align:center;
  margin-top:20px;
}
.copyAll button{
  padding:12px 30px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff00ff,#00f5ff);
  color:#fff;
}
</style>
</head>

<body>

<div class="header">
  <h1>
    🎤 卡通综艺手举牌生成器  
    <span style="font-size:18px;color:#00f5ff;">｜古月AI智能体</span>
  </h1>
  <p>古月AI出品 · 综艺级视觉生成引擎 · 商业级手举牌设计工具</p>
</div>

<div class="container">

  <div class="frame">

    <div class="label">主标题</div>
    <input id="main" placeholder="例：今天我最美">

    <div class="label">副标题（可选）</div>
    <input id="sub" placeholder="例：不服来辩">

    <div class="label">风格</div>
    <select id="style">
      <option>综艺卡通</option>
      <option>潮流贴纸</option>
      <option>活泼可爱</option>
    </select>

    <div class="label">情绪氛围</div>
    <select id="mood">
      <option>搞笑</option>
      <option>兴奋</option>
      <option>炸裂</option>
      <option>可爱</option>
    </select>

    <div class="label">使用场景</div>
    <select id="scene">
      <option>活动打卡</option>
      <option>商场互动</option>
      <option>直播间</option>
    </select>

    <div class="label">元素关键词（可选）</div>
    <input id="extra" placeholder="例：比心 星星 礼盒">

  </div>

  <button class="btn" onclick="generate()">✨ 生成20组提示词</button>

</div>

<div id="result" class="result"></div>

<script>

// 素材库
const shapes=["气泡形","爆炸贴","不规则贴纸","云朵形","对话框","波浪边贴纸"]
const colors=["荧光撞色渐变","粉蓝渐变","紫橙渐变","红黄撞色","高饱和多彩渐变"]
const fonts=["综艺体","粗黑体","卡通圆体","手写体"]
const elements=["大拇指","比心","耶","红包","礼盒","星星","闪电","彩带","奖杯"]

const slogans=[
"拍照神器","全场焦点","出片率爆炸","氛围感拉满",
"镜头必抢","互动感超强","人群吸睛王","传播力爆棚"
]

// 随机
function r(arr){
  return arr[Math.floor(Math.random()*arr.length)]
}

// 结构随机
const structures=[
["主","副","形","色","字","元素","标语"],
["形","主","色","副","字","标语","元素"],
["主","色","形","标语","副","元素","字"]
]

// 单条生成
function createOne(main,sub,style,mood,scene,extra){

  let map={
    主:`主标题「${main}」`,
    副:`副标题「${sub || r(slogans)}」`,
    形:r(shapes),
    色:r(colors),
    字:r(fonts),
    元素:`装饰元素${extra || r(elements)}`,
    标语:`辅助文案「${r(slogans)}」`
  }

  let order=r(structures)
  let content=order.map(k=>map[k]).join("，")

  return `卡通综艺风KT板手举牌设计，${content}，${style}风格，${mood}氛围，适用于${scene}，厚描边视觉，白色粗描边+黑色细外描边，贴纸立体效果，纯色背景，正面视角，居中构图，高清细节，商业可落地`
}

// 生成20条去重
function generateSet(main,sub,style,mood,scene,extra){
  let set=new Set()
  while(set.size<20){
    set.add(createOne(main,sub,style,mood,scene,extra))
  }
  return [...set]
}

// 主函数
function generate(){
  let main=document.getElementById("main").value.trim()
  let sub=document.getElementById("sub").value.trim()
  let style=document.getElementById("style").value
  let mood=document.getElementById("mood").value
  let scene=document.getElementById("scene").value
  let extra=document.getElementById("extra").value

  if(!main){
    alert("请输入主标题")
    return
  }

  let list=generateSet(main,sub,style,mood,scene,extra)

  let html=""
  list.forEach((item,i)=>{
    html+=`
    <div class="item">
      <div class="text">${i+1}. ${item}</div>
      <button class="copy" onclick="copyText(this,'${item}')">复制</button>
    </div>`
  })

  html+=`
  <div class="copyAll">
    <button onclick="copyAll()">📋 一键复制全部</button>
  </div>`

  document.getElementById("result").innerHTML=html
  window.allData=list
}

// 单条复制
function copyText(btn,text){
  navigator.clipboard.writeText(text)
  btn.innerText="已复制"
  btn.classList.add("copied")
}

// 全部复制
function copyAll(){
  navigator.clipboard.writeText(window.allData.join("\n\n"))
  alert("已复制全部20条提示词")
}

</script>

</body>
</html>
