<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>卡通综艺手举牌生成器 - 古月AI智能体</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"Microsoft YaHei";
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a,#222);
  color:#fff;
  padding:40px;
}

.header{text-align:center;margin-bottom:40px;}
.header h1{
  font-size:34px;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  -webkit-background-clip:text;
  color:transparent;
}
.header p{color:#aaa;margin-top:10px;}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
}

.frame{
  border:2px dashed rgba(255,255,255,0.2);
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
}

.label{font-size:14px;color:#aaa;margin-bottom:5px;}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#ff00ff,#00f5ff);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

.result{
  max-width:900px;
  margin:40px auto;
}

.item{
  display:flex;
  justify-content:space-between;
  gap:15px;
  padding:16px;
  margin-bottom:12px;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(255,0,255,0.15),rgba(0,255,255,0.08));
  border:1px solid rgba(255,255,255,0.1);
}

.text{flex:1;font-size:14px;line-height:1.6;}

.copy{
  background:#ff00ff;
  border:none;
  padding:6px 12px;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

.copyAll{text-align:center;margin-top:20px;}
.copyAll button{
  padding:12px 30px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff00ff,#00f5ff);
  color:#fff;
}
</style>
</head>

<body>

<div class="header">
  <h1>
    🎤 卡通综艺手举牌生成器  
    <span style="font-size:18px;color:#00f5ff;">｜古月AI智能体</span>
  </h1>
  <p>极简输入 · 自动生成20组商业级手举牌提示词</p>
</div>

<div class="container">

  <div class="frame">

    <div class="label">主标题</div>
    <input id="main" placeholder="例：今天我最美">

    <div class="label">副标题（可选）</div>
    <input id="sub" placeholder="例：不服来辩">

    <div class="label">元素关键词（可选）</div>
    <input id="extra" placeholder="例：比心 星星 礼盒">

  </div>

  <button class="btn" onclick="generate()">✨ 一键生成20组提示词</button>

</div>

<div id="result" class="result"></div>

<script>

// 随机库
const shapes=["气泡形","爆炸贴","云朵形","对话框","不规则贴纸"]
const colors=["荧光撞色渐变","粉蓝渐变","紫橙渐变","红黄撞色","高饱和渐变"]
const fonts=["综艺体","粗黑体","卡通圆体","手写体"]
const elements=["大拇指","比心","耶","红包","礼盒","星星","闪电","彩带","奖杯"]

const slogans=[
"拍照神器","出片率爆炸","氛围感拉满",
"全场焦点","互动感超强","传播力爆棚"
]

// 随机函数
function r(arr){
  return arr[Math.floor(Math.random()*arr.length)]
}

// 结构变化
const structures=[
["主","副","形","色","字","元素","标语"],
["形","主","色","副","字","标语","元素"],
["主","色","形","标语","副","元素","字"]
]

// 单条生成
function createOne(main,sub,extra){

  let map={
    主:`主标题「${main}」`,
    副:`副标题「${sub || r(slogans)}」`,
    形:r(shapes),
    色:r(colors),
    字:r(fonts),
    元素:`装饰元素${extra || r(elements)}`,
    标语:`辅助文案「${r(slogans)}」`
  }

  let order=r(structures)
  let content=order.map(k=>map[k]).join("，")

  return `卡通综艺风KT板手举牌设计，${content}，厚描边风格，白色粗描边+黑色细外描边，贴纸立体效果，纯色背景，正面视角，居中构图，高清细节，商业可落地`
}

// 生成20条
function generateSet(main,sub,extra){
  let set=new Set()
  while(set.size<20){
    set.add(createOne(main,sub,extra))
  }
  return [...set]
}

// 主函数
function generate(){
  let main=document.getElementById("main").value.trim()
  let sub=document.getElementById("sub").value.trim()
  let extra=document.getElementById("extra").value

  if(!main){
    alert("请输入主标题")
    return
  }

  let list=generateSet(main,sub,extra)

  let html=""
  list.forEach((item,i)=>{
    html+=`
    <div class="item">
      <div class="text">${i+1}. ${item}</div>
      <button class="copy" onclick="copyText(this,'${item}')">复制</button>
    </div>`
  })

  html+=`
  <div class="copyAll">
    <button onclick="copyAll()">📋 一键复制全部</button>
  </div>`

  document.getElementById("result").innerHTML=html
  window.allData=list
}

// 复制
function copyText(btn,text){
  navigator.clipboard.writeText(text)
  btn.innerText="已复制"
}

// 全部复制
function copyAll(){
  navigator.clipboard.writeText(window.allData.join("\n\n"))
  alert("已复制全部20条提示词")
}

</script>

</body>
</html>
